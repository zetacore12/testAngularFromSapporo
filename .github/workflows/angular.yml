name: Create Angular Project (one-shot)

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "Angularプロジェクト名"
        required: true
        default: "my-angular-app"

jobs:
  create:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Angular CLI
        run: npm install -g @angular/cli

      - name: Create Angular project
        run: |
          ng new ${{ github.event.inputs.project_name }} \
            --defaults \
            --skip-git \
            --skip-install

      - name: Install dependencies
        run: |
          cd ${{ github.event.inputs.project_name }}
          npm install

      - name: Move files to root (optional)
        run: |
          shopt -s dotglob
          mv ${{ github.event.inputs.project_name }}/* .
          rm -rf ${{ github.event.inputs.project_name }}

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Initial Angular project (generated)"
          git push
